<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3Dアクションゲーム</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; font-size: 24px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px 0 #000; pointer-events: none; z-index: 100; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 60px; font-family: sans-serif; font-weight: bold; text-shadow: 3px 3px 0 #000; display: none; text-align: center; width: 100%; z-index: 100; pointer-events: none; }
        #retryBtn { font-size: 24px; color: white; background: #333; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; pointer-events: auto; }

        /* ジョイスティックのデザイン */
        #joystickBase {
            position: absolute; width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.2); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 50%;
            display: none; pointer-events: none; transform: translate(-50%, -50%); z-index: 10;
        }
        #joystickStick {
            position: absolute; width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.7); border-radius: 50%;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
    </style>
    <script src="three.min.js"></script>
</head>
<body>
    <div id="ui">倒した数: <span id="scoreText">0</span></div>
    
    <div id="joystickBase">
        <div id="joystickStick"></div>
    </div>

    <div id="gameOver">
        GAME OVER<br>
        <button id="retryBtn" onclick="location.reload()">もう一度遊ぶ</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
