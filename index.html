<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3Dアクションゲーム</title>
    <style>
        /* touch-action: none でスマホのスクロールや拡大を防止します */
        body { margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; font-size: 24px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px 0 #000; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 60px; font-family: sans-serif; font-weight: bold; text-shadow: 3px 3px 0 #000; display: none; text-align: center; width: 100%; }
        #retryBtn { font-size: 24px; color: white; background: #333; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; pointer-events: auto; }

        /* 【新しい要素】スマホ用バーチャルパッドのデザイン */
        #dpad { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: 60px 60px 60px; grid-template-rows: 60px 60px 60px; gap: 5px; }
        #upBtn { grid-column: 2; grid-row: 1; }
        #leftBtn { grid-column: 1; grid-row: 2; }
        #downBtn { grid-column: 2; grid-row: 3; }
        #rightBtn { grid-column: 3; grid-row: 2; }
        
        .ctrl-btn { background: rgba(255, 255, 255, 0.3); border: 2px solid #fff; border-radius: 10px; font-size: 24px; font-weight: bold; color: #333; display: flex; justify-content: center; align-items: center; }
        .ctrl-btn:active { background: rgba(255, 255, 255, 0.7); } /* 押した時に光る */

        /* 攻撃ボタンのデザイン */
        #attackBtn { position: absolute; bottom: 40px; right: 20px; width: 90px; height: 90px; border-radius: 50%; background: rgba(255, 50, 50, 0.5); border: 3px solid #fff; color: white; font-size: 24px; font-weight: bold; display: flex; justify-content: center; align-items: center; }
        #attackBtn:active { background: rgba(255, 50, 50, 0.9); }
    </style>
    <script src="three.min.js"></script>
</head>
<body>
    <div id="ui">倒した数: <span id="scoreText">0</span></div>
    
    <div id="dpad">
        <div id="upBtn" class="ctrl-btn">W</div>
        <div id="leftBtn" class="ctrl-btn">A</div>
        <div id="downBtn" class="ctrl-btn">S</div>
        <div id="rightBtn" class="ctrl-btn">D</div>
    </div>
    <div id="attackBtn">剣</div>

    <div id="gameOver">
        GAME OVER<br>
        <button id="retryBtn" onclick="location.reload()">もう一度遊ぶ</button>
    </div>

    <script>
        let score = 0;
        let isGameOver = false;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        const floorGeometry = new THREE.PlaneGeometry(100, 100);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x228b22 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const textureLoader = new THREE.TextureLoader();
        const playerTex = textureLoader.load('player.png');
        const swordTex = textureLoader.load('sword.png');
        const mobTextures = [
            textureLoader.load('mob1.png'),
            textureLoader.load('mob2.png'),
            textureLoader.load('mob3.png')
        ];

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const bodyGeometry = new THREE.BoxGeometry(1, 2, 1);
        const bodyMaterial = new THREE.MeshStandardMaterial({ map: playerTex });
        const playerBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
        playerBody.position.y = 1;
        playerGroup.add(playerBody);

        const swordGeometry = new THREE.BoxGeometry(0.2, 1.5, 0.2);
        swordGeometry.translate(0, 0.75, 0);
        const swordMaterial = new THREE.MeshStandardMaterial({ map: swordTex });
        const sword = new THREE.Mesh(swordGeometry, swordMaterial);
        sword.position.set(0.6, 1, -0.2);
        playerGroup.add(sword);

        const enemies = [];
        const enemyGeometry = new THREE.BoxGeometry(1, 2, 1);

        function spawnEnemy() {
            if (isGameOver) return;
            const randomIndex = Math.floor(Math.random() * mobTextures.length);
            const enemyMaterial = new THREE.MeshStandardMaterial({ map: mobTextures[randomIndex] });
            const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = 15;
            enemy.position.x = playerGroup.position.x + Math.cos(angle) * radius;
            enemy.position.z = playerGroup.position.z + Math.sin(angle) * radius;
            enemy.position.y = 1;
            
            scene.add(enemy);
            enemies.push(enemy);
        }
        setInterval(spawnEnemy, 2000);

        // キーボードとマウスの入力（PC用）
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (event) => {
            const key = event.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = true;
        });
        document.addEventListener('keyup', (event) => {
            const key = event.key.toLowerCase();
            if (keys.hasOwnProperty(key)) keys[key] = false;
        });

        let isAttacking = false;
        let attackFrame = 0;
        window.addEventListener('mousedown', (event) => {
            if (event.button === 0 && !isAttacking && !isGameOver) {
                isAttacking = true;
                attackFrame = 0;
            }
        });

        // 【新しい要素】スマホのタッチ操作（モバイル用）
        const setupTouch = (id, key) => {
            const btn = document.getElementById(id);
            // 指を置いた時（キーを押したのと同じ扱いにする）
            btn.addEventListener('touchstart', (e) => {
                e.preventDefault(); 
                keys[key] = true;
            }, { passive: false });
            // 指を離した時
            btn.addEventListener('touchend', (e) => {
                e.preventDefault();
                keys[key] = false;
            }, { passive: false });
        };

        // 十字キーをPCのWASDと連動させる
        setupTouch('upBtn', 'w');
        setupTouch('leftBtn', 'a');
        setupTouch('downBtn', 's');
        setupTouch('rightBtn', 'd');

        // 剣ボタンの設定
        const attackBtn = document.getElementById('attackBtn');
        attackBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (!isAttacking && !isGameOver) {
                isAttacking = true;
                attackFrame = 0;
            }
        }, { passive: false });


        const playerSpeed = 0.15;
        const enemySpeed = 0.05;

        function animate() {
            requestAnimationFrame(animate);

            if (isGameOver) {
                renderer.render(scene, camera);
                return;
            }

            if (keys.w) playerGroup.position.z -= playerSpeed;
            if (keys.s) playerGroup.position.z += playerSpeed;
            if (keys.a) playerGroup.position.x -= playerSpeed;
            if (keys.d) playerGroup.position.x += playerSpeed;

            if (isAttacking) {
                attackFrame++;
                if (attackFrame <= 10) sword.rotation.x -= 0.15;
                else if (attackFrame <= 20) sword.rotation.x += 0.15;
                else {
                    isAttacking = false;
                    sword.rotation.x = 0;
                }

                if (attackFrame === 10) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const e = enemies[i];
                        const distance = playerGroup.position.distanceTo(e.position);
                        
                        if (distance < 3.0) {
                            scene.remove(e);
                            enemies.splice(i, 1);
                            score++;
                            document.getElementById('scoreText').innerText = score;
                        }
                    }
                }
            }

            enemies.forEach((e) => {
                if (e.position.x < playerGroup.position.x) e.position.x += enemySpeed;
                if (e.position.x > playerGroup.position.x) e.position.x -= enemySpeed;
                if (e.position.z < playerGroup.position.z) e.position.z += enemySpeed;
                if (e.position.z > playerGroup.position.z) e.position.z -= enemySpeed;

                const distanceToPlayer = playerGroup.position.distanceTo(e.position);
                if (distanceToPlayer < 1.0) {
                    isGameOver = true;
                    document.getElementById('gameOver').style.display = 'block';
                }
            });

            camera.position.x = playerGroup.position.x;
            camera.position.y = playerGroup.position.y + 4;
            camera.position.z = playerGroup.position.z + 8;
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
