<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>3Dアクションゲーム</title>
    <style>
        body { margin: 0; overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none; }
        canvas { display: block; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; font-size: 24px; font-family: sans-serif; font-weight: bold; text-shadow: 2px 2px 0 #000; pointer-events: none; }
        #gameOver { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-size: 60px; font-family: sans-serif; font-weight: bold; text-shadow: 3px 3px 0 #000; display: none; text-align: center; width: 100%; pointer-events: none; }
        #retryBtn { font-size: 24px; color: white; background: #333; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; pointer-events: auto; }

        /* 【新しい要素】バーチャルジョイスティックのデザイン */
        #joystickBase {
            position: absolute;
            width: 120px; height: 120px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            display: none; /* 普段は隠しておく */
            pointer-events: none; /* タッチ判定の邪魔にならないようにする */
            transform: translate(-50%, -50%); /* 中心を指の位置に合わせる */
            z-index: 10;
        }
        #joystickStick {
            position: absolute;
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }
    </style>
    <script src="three.min.js"></script>
</head>
<body>
    <div id="ui">倒した数: <span id="scoreText">0</span></div>
    
    <div id="joystickBase">
        <div id="joystickStick"></div>
    </div>

    <div id="gameOver">
        GAME OVER<br>
        <button id="retryBtn" onclick="location.reload()">もう一度遊ぶ</button>
    </div>

    <script>
        let score = 0;
        let isGameOver = false;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(10, 20, 10);
        scene.add(directionalLight);

        const floorGeometry = new THREE.PlaneGeometry(100, 100);
        const floorMaterial = new THREE.MeshStandardMaterial({ color: 0x228b22 });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        const textureLoader = new THREE.TextureLoader();
        const playerTex = textureLoader.load('player.png');
        const swordTex = textureLoader.load('sword.png');
        const mobTextures = [
            textureLoader.load('mob1.png'),
            textureLoader.load('mob2.png'),
            textureLoader.load('mob3.png')
        ];

        const playerGroup = new THREE.Group();
        scene.add(playerGroup);

        const bodyGeometry = new THREE.BoxGeometry(1, 2, 1);
        const bodyMaterial = new THREE.MeshStandardMaterial({ map: playerTex });
        const playerBody = new THREE.Mesh(bodyGeometry, bodyMaterial);
        playerBody.position.y = 1;
        playerGroup.add(playerBody);

        const swordGeometry = new THREE.BoxGeometry(0.2, 1.5, 0.2);
        swordGeometry.translate(0, 0.75, 0);
        const swordMaterial = new THREE.MeshStandardMaterial({ map: swordTex });
        const sword = new THREE.Mesh(swordGeometry, swordMaterial);
        sword.position.set(0.6, 1, -0.2);
        playerGroup.add(sword);

        const enemies = [];
        const enemyGeometry = new THREE.BoxGeometry(1, 2, 1);

        function spawnEnemy() {
            if (isGameOver) return;
            const randomIndex = Math.floor(Math.random() * mobTextures.length);
            const enemyMaterial = new THREE.MeshStandardMaterial({ map: mobTextures[randomIndex] });
            const enemy = new THREE.Mesh(enemyGeometry, enemyMaterial);
            
            const angle = Math.random() * Math.PI * 2;
            const radius = 15;
            enemy.position.x = playerGroup.position.x + Math.cos(angle) * radius;
            enemy.position.z = playerGroup.position.z + Math.sin(angle) * radius;
            enemy.position.y = 1;
            
            scene.add(enemy);
            enemies.push(enemy);
        }
        setInterval(spawnEnemy, 2000);

        let isAttacking = false;
        let attackFrame = 0;

        // 【新しい要素】ジョイスティックの状態管理
        const joystick = { active: false, id: null, originX: 0, originY: 0, deltaX: 0, deltaY: 0 };
        const maxJoyDistance = 40; // スティックが動く最大距離

        const joystickBase = document.getElementById('joystickBase');
        const joystickStick = document.getElementById('joystickStick');

        // タッチ操作（スマホ用）
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];

                if (touch.clientX < window.innerWidth / 2) {
                    // 左半分のタッチ：ジョイスティック出現
                    if (!joystick.active) {
                        joystick.active = true;
                        joystick.id = touch.identifier;
                        joystick.originX = touch.clientX;
                        joystick.originY = touch.clientY;
                        joystick.deltaX = 0;
                        joystick.deltaY = 0;

                        // UIを表示
                        joystickBase.style.display = 'block';
                        joystickBase.style.left = touch.clientX + 'px';
                        joystickBase.style.top = touch.clientY + 'px';
                        joystickStick.style.transform = `translate(-50%, -50%)`;
                    }
                } else {
                    // 右半分のタッチ：攻撃
                    if (!isAttacking && !isGameOver) {
                        isAttacking = true;
                        attackFrame = 0;
                    }
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!joystick.active) return;

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === joystick.id) {
                    // 指の移動量を計算
                    let dx = touch.clientX - joystick.originX;
                    let dy = touch.clientY - joystick.originY;
                    
                    // スティックが枠を飛び出さないように制限
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance > maxJoyDistance) {
                        dx = (dx / distance) * maxJoyDistance;
                        dy = (dy / distance) * maxJoyDistance;
                    }

                    joystick.deltaX = dx;
                    joystick.deltaY = dy;

                    // UIのスティックを動かす
                    joystickStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (joystick.active && touch.identifier === joystick.id) {
                    // ジョイスティックをリセットして隠す
                    joystick.active = false;
                    joystick.deltaX = 0;
                    joystick.deltaY = 0;
                    joystickBase.style.display = 'none';
                }
            }
        }, { passive: false });


        // キーボードとマウスの入力（PCでのテスト用）
        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
        window.addEventListener('mousedown', (e) => {
            if (e.button === 0 && !isAttacking && !isGameOver) { isAttacking = true; attackFrame = 0; }
        });

        const playerSpeed = 0.15;
        const enemySpeed = 0.05;

        function animate() {
            requestAnimationFrame(animate);

            if (isGameOver) {
                renderer.render(scene, camera);
                return;
            }

            // 【移動処理】ジョイスティックかキーボードで動かす
            if (joystick.active) {
                // ジョイスティックの傾きに合わせて移動（滑らかに動きます）
                playerGroup.position.x += (joystick.deltaX / maxJoyDistance) * playerSpeed;
                playerGroup.position.z += (joystick.deltaY / maxJoyDistance) * playerSpeed;
            } else {
                // PC用
                if (keys.w) playerGroup.position.z -= playerSpeed;
                if (keys.s) playerGroup.position.z += playerSpeed;
                if (keys.a) playerGroup.position.x -= playerSpeed;
                if (keys.d) playerGroup.position.x += playerSpeed;
            }

            if (isAttacking) {
                attackFrame++;
                if (attackFrame <= 10) sword.rotation.x -= 0.15;
                else if (attackFrame <= 20) sword.rotation.x += 0.15;
                else {
                    isAttacking = false;
                    sword.rotation.x = 0;
                }

                if (attackFrame === 10) {
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const e = enemies[i];
                        if (playerGroup.position.distanceTo(e.position) < 3.0) {
                            scene.remove(e);
                            enemies.splice(i, 1);
                            score++;
                            document.getElementById('scoreText').innerText = score;
                        }
                    }
                }
            }

            enemies.forEach((e) => {
                if (e.position.x < playerGroup.position.x) e.position.x += enemySpeed;
                if (e.position.x > playerGroup.position.x) e.position.x -= enemySpeed;
                if (e.position.z < playerGroup.position.z) e.position.z += enemySpeed;
                if (e.position.z > playerGroup.position.z) e.position.z -= enemySpeed;

                if (playerGroup.position.distanceTo(e.position) < 1.0) {
                    isGameOver = true;
                    document.getElementById('gameOver').style.display = 'block';
                }
            });

            camera.position.x = playerGroup.position.x;
            camera.position.y = playerGroup.position.y + 4;
            camera.position.z = playerGroup.position.z + 8;
            camera.lookAt(playerGroup.position);

            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
</html>
